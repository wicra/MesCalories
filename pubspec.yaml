name: mes_calories
description: "Application open source de suivi calorique par IA — local-first, privacy-first."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.6.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.2.0

  # Base de données locale
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Réseau
  dio: ^5.7.0

  # Stockage sécurisé
  flutter_secure_storage: ^9.2.2

  # Préférences
  shared_preferences: ^2.3.3

  # Reconnaissance vocale
  speech_to_text: ^7.0.0

  # Image picker
  image_picker: ^1.1.2

  # Animations
  flutter_animate: ^4.5.0

  # Icônes
  phosphor_flutter: ^2.1.0

  # Internationalisation
  intl: ^0.19.0

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
