allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// Fix isar_flutter_libs namespace manquant (incompatible AGP 8+ sans namespace)
// plugins.withId s'exécute au moment où le plugin est appliqué (phase de configuration)
subprojects {
    plugins.withId("com.android.library") {
        android {
            if (namespace == null) {
                namespace = "com.isar.${project.name.replace('-', '_')}"
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
